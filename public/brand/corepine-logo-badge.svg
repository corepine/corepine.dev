<svg width="1024" height="1024" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Corepine logo badge</title>
  <desc id="desc">Corepine rounded badge logo with an orbital shell and glowing core.</desc>

  <defs>
    <linearGradient id="badge-bg" x1="68" y1="56" x2="452" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071126"/>
      <stop offset="1" stop-color="#040712"/>
    </linearGradient>

    <linearGradient id="badge-shell" x1="84" y1="116" x2="438" y2="404" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>

    <radialGradient id="badge-core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(122)">
      <stop offset="0" stop-color="#E6FFFB"/>
      <stop offset="0.48" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#0B1220"/>
