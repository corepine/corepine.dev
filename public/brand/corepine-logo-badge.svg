  <circle cx="256" cy="256" r="132" stroke="#67E8F9" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="1 11"/>

  <path d="M108 256C108 173 173 108 256 108" stroke="#A5F3FC" stroke-width="9" stroke-linecap="round"/>
  <path d="M404 256C404 339 339 404 256 404" stroke="#67E8F9" stroke-width="9" stroke-linecap="round"/>

  <circle cx="256" cy="256" r="102" fill="url(#badge-core)"/>
  <circle cx="256" cy="256" r="48" fill="#8AF4EA"/>
  <circle cx="256" cy="256" r="15" fill="#F0FDFF"/>

  <circle cx="352" cy="220" r="7" fill="#5EEAD4"/>
  <circle cx="176" cy="332" r="6" fill="#22D3EE"/>
  <circle cx="220" cy="158" r="5" fill="#7DD3FC"/>
